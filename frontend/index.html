<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Presença com QR Code - Automação Inova">
  <title>Sistema de Presença | Automação Inova</title>
  
  <!-- Favicon (adicionar depois) -->
  <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/print.css">
  
  <!-- Bootstrap Icons (opcional - pode usar Font Awesome) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <style>
    /* Estilos específicos do index.html */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    main {
      flex: 1;
      padding: 2rem 0;
    }
    
    footer {
      background-color: var(--cor-fundo-secundario);
      padding: 1.5rem 0;
      text-align: center;
      border-top: 1px solid var(--cor-borda);
      color: var(--cor-texto-secundario);
      font-size: 0.875rem;
    }
    
    .nav-link.active {
      font-weight: 700;
      color: var(--cor-secundaria) !important;
    }
    
    #theme-toggle {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      transition: var(--transition);
    }
    
    #theme-toggle:hover {
      transform: scale(1.2);
    }
    
    #user-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: white;
    }
    
    .user-name {
      font-weight: 500;
    }
    
    /* Responsivo */
    @media (max-width: 768px) {
      .navbar .container {
        flex-direction: column;
        gap: 1rem;
      }
      
      .navbar-menu {
        flex-direction: column;
        width: 100%;
        text-align: center;
      }
      
      #user-info {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <!-- Logo/Título -->
      <a href="#/dashboard" class="navbar-brand">
        📋 Sistema de Presença
      </a>
      
      <!-- Menu de Navegação -->
      <ul class="navbar-menu">
        <li><a href="#/dashboard" class="nav-link">Dashboard</a></li>
        <li><a href="#/alunos" class="nav-link">Alunos</a></li>
        <li><a href="#/eventos" class="nav-link">Eventos</a></li>
        <li><a href="#/estatisticas" class="nav-link">Estatísticas</a></li>
      </ul>
      
      <!-- Usuário e Tema -->
      <div style="display: flex; align-items: center; gap: 1rem;">
        <button id="theme-toggle" title="Alternar tema">🌙</button>
        <div id="user-info"></div>
      </div>
    </div>
  </nav>
  
  <!-- Container Principal (páginas carregam aqui) -->
  <main>
    <div class="container">
      <div id="app">
        <!-- Conteúdo das páginas será carregado aqui via JavaScript -->
        <div style="text-align: center; padding: 4rem 1rem;">
          <div class="loading"></div>
          <p style="margin-top: 1rem; color: var(--cor-texto-secundario);">
            Carregando...
          </p>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Rodapé -->
  <footer>
    <div class="container">
      <p>&copy; 2026 Automação Inova. Todos os direitos reservados.</p>
      <p>Sistema de Presença com QR Code</p>
    </div>
  </footer>
  
  <!-- JavaScript -->
  <script src="config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/polling.js"></script>
  <script src="js/app.js"></script>
  
</body>
</html>
